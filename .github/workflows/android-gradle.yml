# This workflow will build a Java project with Gradle
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-gradle

name: Build for Android

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'corretto'
        java-version: '21'
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Download Android SDK
      run: |
        /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-36"
        curl -o /usr/local/lib/android/sdk/platforms/android-36/android.jar -L https://github.com/Reginer/aosp-android-jar/raw/refs/heads/main/android-36/android-jdk21.jar
    - name: Build with Gradle
      run: |
        ./gradlew :app:packageRelease :lswwallpaper:packageRelease
        ./gradlew --stop
    - name: Get Latest Release
      id: release
      uses: pozetroninc/github-action-get-latest-release@master
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
    - name: Upload App Logs
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: logs
        path: ${{ github.workspace }}/app/build/outputs/logs/
    - name: Upload Companion Logs
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: logs
        path: ${{ github.workspace }}/lswwallpaper/build/outputs/logs/
    - name: Check App Output Exists
      run: ls -laR ${{ github.workspace }}/app/build/outputs/apk/
    - name: Check Companion Output Exists
      run: ls -laR ${{ github.workspace }}/lswwallpaper/build/outputs/apk/
    # https://github.com/r0adkll/sign-android-release/issues/84#issuecomment-1889636075
    - name: Set up build tool version variable
      shell: bash
      run: |
        BUILD_TOOL_VERSION=$(ls /usr/local/lib/android/sdk/build-tools/ | tail -n 1)
        echo "BUILD_TOOL_VERSION=$BUILD_TOOL_VERSION" >> $GITHUB_ENV
        echo Last build tool version is: $BUILD_TOOL_VERSION
    - name: Sign App APK
      id: sign_apk
      uses: filippoLeporati93/android-release-signer@v1
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
        alias: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
        keyStorePassword: ${{ secrets.ANDROID_SIGNING_KEY_PWD }}
        keyPassword: ${{ secrets.ANDROID_SIGNING_KEY_PWD }}
      env:
        BUILD_TOOLS_VERSION: ${{ env.BUILD_TOOL_VERSION }}
    - name: Sign Companion APK
      id: sign_companion_apk
      uses: filippoLeporati93/android-release-signer@v1
      with:
        releaseDirectory: lswwallpaper/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
        alias: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
        keyStorePassword: ${{ secrets.ANDROID_SIGNING_KEY_PWD }}
        keyPassword: ${{ secrets.ANDROID_SIGNING_KEY_PWD }}
      env:
        BUILD_TOOLS_VERSION: ${{ env.BUILD_TOOL_VERSION }}
    - name: Rename App APK
      run: |
        STRIPPED_NAME=$(echo "${{ steps.sign_apk.outputs.signedReleaseFile }}" | sed s/"-unsigned-signed"//)
        mv ${{ steps.sign_apk.outputs.signedReleaseFile }} $STRIPPED_NAME
        echo "STRIPPED_NAME=$STRIPPED_NAME" >> $GITHUB_ENV
    - name: Rename Companion APK
      run: |
        STRIPPED_COMPANION_NAME=$(echo "${{ steps.sign_companion_apk.outputs.signedReleaseFile }}" | sed s/"-unsigned-signed"//)
        mv ${{ steps.sign_companion_apk.outputs.signedReleaseFile }} $STRIPPED_NAME
        echo "STRIPPED_COMPANION_NAME=$STRIPPED_COMPANION_NAME" >> $GITHUB_ENV
    - name: Upload App APK
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: LockscreenWidgets
        path: ${{ env.STRIPPED_NAME }}
      env:
        SIGNED_RELEASE_FILE: ${{ env.STRIPPED_NAME }}
    - name: Upload Companion APK
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: LockscreenWidgets
        path: ${{ env.STRIPPED_COMPANION_NAME }}
      env:
        SIGNED_RELEASE_FILE: ${{ env.STRIPPED_COMPANION_NAME }}
    - name: Upload Release App APK
      uses: ncipollo/release-action@v1
      with:
        artifacts: ${{ env.STRIPPED_NAME }}
        token: ${{ secrets.GITHUB_TOKEN }}
        allowUpdates: true
        replacesArtifacts: false
        omitBodyDuringUpdate: true
        tag: ${{ steps.release.outputs.release }}
      env:
        SIGNED_RELEASE_FILE: ${{ env.STRIPPED_NAME }}
    - name: Upload Release Companion APK
      uses: ncipollo/release-action@v1
      with:
        artifacts: ${{ env.STRIPPED_COMPANION_NAME }}
        token: ${{ secrets.GITHUB_TOKEN }}
        allowUpdates: true
        replacesArtifacts: false
        omitBodyDuringUpdate: true
        tag: ${{ steps.release.outputs.release }}
      env:
        SIGNED_RELEASE_FILE: ${{ env.STRIPPED_COMPANION_NAME }}
